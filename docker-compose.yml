services:
  # --- Infrastructure Services ---
  postgres:
    image: postgres:16-alpine
    container_name: iob-postgres
    restart: always
    environment:
      POSTGRES_USER: iob_user
      POSTGRES_PASSWORD: iob_password
      POSTGRES_DB: iob_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/iob_core_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/database/seed_users.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iob_user -d iob_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iob-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iob-mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data

  neo4j:
    image: neo4j:5-community
    container_name: iob-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/iob_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: iob-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Application Services ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iob-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MQTT_HOST=mosquitto
      - DATABASE_URL=postgresql+asyncpg://iob_user:iob_password@postgres:5432/iob_db
      - IOB_POSTGRES_DSN=postgresql+asyncpg://iob_user:iob_password@postgres:5432/iob_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-platform:
    build:
      context: ./ai-platform
      dockerfile: Dockerfile
    container_name: iob-ai-platform
    restart: always
    ports:
      - "8001:8000"
    environment:
      - NEO4J_HOST=neo4j
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - ENVIRONMENT=development
      - INTERNAL_TOKEN=development
      - ALLOW_UNAUTHENTICATED_HEALTH=true
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iob-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  neo4j_data:
  qdrant_data:
