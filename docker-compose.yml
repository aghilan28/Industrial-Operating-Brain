# =============================================================================
# INDUSTRIAL OPERATING BRAIN (IOB) — PHASE 7
# Enterprise Infrastructure Orchestration & Container Stabilization
# =============================================================================
# Three-tier network segmentation:
#   iob-public-net : host ingress -> edge reverse proxy only
#   iob-app-net    : edge <-> frontend <-> backend <-> ai-platform
#   iob-data-net   : datastores (postgres, redis, mosquitto, neo4j, qdrant)
#
# NOTE ON `internal: true`
#   iob-data-net is a normal bridge here because the data services publish
#   loopback-only debug ports (127.0.0.1:...). Docker cannot publish host ports
#   for a container attached solely to an `internal` network. For a hardened
#   deployment with ZERO host exposure, run:
#       docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   which drops every data-tier port and flips iob-data-net to internal.
#
# Bring up:  docker compose up -d --build
# =============================================================================

networks:
  iob-public-net:
    name: iob-public-net
    driver: bridge
  iob-app-net:
    name: iob-app-net
    driver: bridge
  iob-data-net:
    name: iob-data-net
    driver: bridge

volumes:
  iob_postgres_data:
    driver: local
  iob_redis_data:
    driver: local
  iob_mqtt_data:
    driver: local
  iob_mqtt_log:
    driver: local
  iob_neo4j_data:
    driver: local
  iob_neo4j_logs:
    driver: local
  iob_qdrant_data:
    driver: local

# Shared log rotation policy — prevents telemetry log disk exhaustion (Risk #1)
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ===========================================================================
  # DATA & STORAGE TIER  (iob-data-net)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: iob-postgres
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iob_password}
      POSTGRES_DB: ${POSTGRES_DB:-iob_db}
      # Keeps initdb deterministic across host locales
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - iob_postgres_data:/var/lib/postgresql/data
      # Init scripts run ONLY on first boot of an empty volume.
      - ./backend/database/iob_core_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/database/seed_users.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      # Loopback-only: reachable from this host (psql/pgAdmin), not from the LAN.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    networks:
      - iob-data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iob_user} -d ${POSTGRES_DB:-iob_db} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  redis:
    image: redis:7-alpine
    container_name: iob-redis
    restart: always
    logging: *default-logging
    # AOF persistence + password auth (Phase 7 hardening)
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:-redis_secret_password}
    volumes:
      - iob_redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - iob-data-net
    healthcheck:
      # REDISCLI_AUTH avoids leaking the password into `ps` inside the container.
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iob-mosquitto
    restart: always
    logging: *default-logging
    volumes:
      - ./infrastructure/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - iob_mqtt_data:/mosquitto/data
      - iob_mqtt_log:/mosquitto/log
    ports:
      - "127.0.0.1:${MQTT_HOST_PORT:-1883}:1883"
      - "127.0.0.1:${MQTT_WS_HOST_PORT:-9001}:9001"
    networks:
      - iob-data-net
    healthcheck:
      # $$SYS/# is only published when sys_interval > 0 (set in mosquitto.conf).
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 3 -i iob-healthcheck >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  neo4j:
    image: neo4j:5-community
    container_name: iob-neo4j
    restart: always
    logging: *default-logging
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/iob_password}
      # Neo4j 5 server.* namespace (dbms.memory.* was removed in 5.x)
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1024m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    volumes:
      - iob_neo4j_data:/data
      - iob_neo4j_logs:/logs
    ports:
      - "127.0.0.1:${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    networks:
      - iob-data-net
    healthcheck:
      # Authenticated Bolt probe — proves the DB accepts queries, not just HTTP.
      test: ["CMD-SHELL", "cypher-shell -a bolt://127.0.0.1:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-iob_password} 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  qdrant:
    # Pinned to match qdrant-client==1.11.3 in ai-platform/requirements.txt.
    image: qdrant/qdrant:v1.11.3
    container_name: iob-qdrant
    restart: always
    logging: *default-logging
    volumes:
      - iob_qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HOST_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    networks:
      - iob-data-net
    healthcheck:
      # The qdrant image ships no curl/wget — use a bash TCP probe on /dev/tcp.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  # ===========================================================================
  # APPLICATION TIER  (iob-app-net + iob-data-net)
  # ===========================================================================
  ai-platform:
    build:
      context: ./ai-platform
      dockerfile: Dockerfile
    image: iob/ai-platform:phase7
    container_name: iob-ai-platform
    restart: always
    logging: *default-logging
    environment:
      # --- Runtime (matches ai-platform/app/core/config.py field names) ---
      APP_ENV: ${AI_APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ALLOW_ORIGINS: ${AI_CORS_ALLOW_ORIGINS:-http://localhost,http://localhost:3000}
      # --- Service-to-service DNS (was hardcoded localhost) ---
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_HOST: neo4j
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-iob_password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      REDIS_HOST: redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_password}@redis:6379/1
      # --- Phase 0 internal-only guard ---
      SERVICE_API_KEY: ${INTERNAL_SERVICE_TOKEN:-development}
      INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-development}
      ALLOW_UNAUTHENTICATED_HEALTH: "true"
    ports:
      - "127.0.0.1:${AI_PLATFORM_HOST_PORT:-8001}:8000"
    networks:
      - iob-app-net
      - iob-data-net
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python:3.11-slim has no curl; urllib is always available.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=4).status==200 else sys.exit(1)\" || exit 1"]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: iob/backend:phase7
    container_name: iob-backend
    restart: always
    logging: *default-logging
    environment:
      # --- Deployment context ---
      # Backend Settings.validate_production_boundaries() hard-fails on
      # production unless SECRET_KEY (>=32 chars), MQTT_PASSWORD and
      # DATABASE_URL are all explicitly provided. See .env.example.
      ENV: ${BACKEND_ENV:-development}
      ENVIRONMENT: ${BACKEND_ENVIRONMENT:-development}
      DEBUG: ${BACKEND_DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-dev_only_secret_key_change_me_32_chars_min}
      # --- PostgreSQL (config.py reads DATABASE_URL, not POSTGRES_HOST) ---
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iob_user}:${POSTGRES_PASSWORD:-iob_password}@postgres:5432/${POSTGRES_DB:-iob_db}
      IOB_POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-iob_user}:${POSTGRES_PASSWORD:-iob_password}@postgres:5432/${POSTGRES_DB:-iob_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-iob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iob_password}
      POSTGRES_DB: ${POSTGRES_DB:-iob_db}
      # --- Redis (config.py reads REDIS_URL) ---
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_password}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
      # --- MQTT (config.py reads MQTT_BROKER_HOST / MQTT_BROKER_PORT) ---
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-iob-backend}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      IOB_MQTT_URL: mqtt://mosquitto:1883
      # --- AI platform (config.py reads AI_SERVICE_URL) ---
      AI_SERVICE_URL: http://ai-platform:8000
      AI_PLATFORM_URL: http://ai-platform:8000
      AI_SERVICE_TIMEOUT: ${AI_SERVICE_TIMEOUT:-30}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-development}
      # --- CORS: browser origin is the edge proxy on :80 ---
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:3000}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    networks:
      - iob-app-net
      - iob-data-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      ai-platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  # ===========================================================================
  # FRONTEND TIER  (Next.js SSR — NOT a static bundle)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at BUILD time by Next.js, so they must be
        # build args. Relative URLs keep the browser talking to the edge proxy.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
    image: iob/frontend:phase7
    container_name: iob-frontend
    restart: always
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Server-side rewrite target — replaces the hardcoded localhost:8000.
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    networks:
      - iob-app-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # node:20-alpine ships busybox wget, not curl.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ===========================================================================
  # EDGE TIER — Nginx reverse proxy (the ONLY host-exposed service)
  # ===========================================================================
  edge:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    image: iob/edge:phase7
    container_name: iob-edge
    restart: always
    logging: *default-logging
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    networks:
      - iob-public-net
      - iob-app-net
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/edge-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
