# =============================================================================
# IOB PHASE 7 — Edge Reverse Proxy
# infrastructure/nginx/nginx.conf
# =============================================================================
# Terminates all host ingress on :80 and fans out over iob-app-net:
#     /api/v1/ws/...   -> backend:8000   (WebSocket, versioned envelopes)
#     /api/v1/stream   -> backend:8000   (WebSocket, legacy frame contract)
#     /api/v1/...      -> backend:8000   (REST)
#     /                -> frontend:3000  (Next.js SSR + HMR-safe)
#
# The frontend is Next.js SSR, so `/` is PROXIED to the node server. It is not
# served from disk (that would break middleware.ts auth and server components).
# =============================================================================

# Maps the client's Upgrade header to the correct Connection value.
# Without this, a plain `Connection "upgrade"` breaks ordinary keep-alive REST.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream iob_backend {
    server backend:8000;
    keepalive 32;
}

upstream iob_frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Telemetry payloads and SOP/manual uploads can exceed the 1m default.
    client_max_body_size 25m;

    # Streaming responses must not be buffered by the proxy.
    proxy_buffering off;
    proxy_request_buffering off;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- Edge liveness (served locally, never proxied) ----------------------
    location = /edge-health {
        access_log off;
        add_header Content-Type application/json always;
        return 200 '{"status":"healthy","tier":"edge"}';
    }

    # -------------------------------------------------------------------------
    # PHASE 5 REAL-TIME TELEMETRY — versioned envelope sockets
    #   ws://localhost/api/v1/ws/telemetry/<client-id>?token=<jwt>
    # Declared BEFORE the generic /api/v1/ block so it wins the prefix match.
    # -------------------------------------------------------------------------
    location /api/v1/ws/ {
        proxy_pass http://iob_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived sockets: do not reap idle telemetry streams.
        proxy_connect_timeout 7d;
        proxy_read_timeout    7d;
        proxy_send_timeout    7d;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # -------------------------------------------------------------------------
    # PHASE 5 REAL-TIME TELEMETRY — legacy frame contract
    #   ws://localhost/api/v1/stream?token=<jwt>
    # Exact match so that /api/v1/stream/health still routes as plain REST.
    # -------------------------------------------------------------------------
    location = /api/v1/stream {
        proxy_pass http://iob_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_read_timeout    7d;
        proxy_send_timeout    7d;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # ---- REST API gateway ---------------------------------------------------
    location /api/ {
        proxy_pass http://iob_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ---- Backend-owned aliases ---------------------------------------------
    location /health {
        access_log off;
        proxy_pass http://iob_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location /docs        { proxy_pass http://iob_backend; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://iob_backend; proxy_set_header Host $host; }

    # ---- Next.js static assets (immutable, safe to cache hard) --------------
    location /_next/static/ {
        proxy_pass http://iob_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Next.js SSR application (catch-all) --------------------------------
    location / {
        proxy_pass http://iob_frontend;

        proxy_http_version 1.1;
        # Next.js dev/HMR and React server components use upgrades too.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
