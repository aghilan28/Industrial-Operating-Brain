# =============================================================================
# IOB PHASE 7 — Eclipse Mosquitto 2.x broker configuration
# infrastructure/mqtt/mosquitto.conf
# =============================================================================
# Mosquitto 2.x denies anonymous connections by default. The broker is reachable
# only from iob-data-net (and 127.0.0.1 on the host), so anonymous access is
# acceptable for this deployment tier.
#
# HARDENING FOR PRODUCTION: set `allow_anonymous false`, mount a password file
# via `password_file /mosquitto/config/passwd`, and populate MQTT_USERNAME /
# MQTT_PASSWORD in .env (backend/apps/core/config.py already reads them).
# =============================================================================

# ---- Primary MQTT listener --------------------------------------------------
listener 1883 0.0.0.0
protocol mqtt

# ---- WebSocket listener (browser / diagnostic MQTT clients) -----------------
listener 9001 0.0.0.0
protocol websockets

# ---- Authentication ---------------------------------------------------------
allow_anonymous true

# ---- Persistence (survives container restarts; volume: iob_mqtt_data) -------
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ---- Logging ----------------------------------------------------------------
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ---- $SYS metrics -----------------------------------------------------------
# REQUIRED by the compose healthcheck: the probe subscribes to
# $SYS/broker/uptime, which is only published when sys_interval > 0.
sys_interval 10

# ---- Message limits / backpressure -----------------------------------------
max_queued_messages 10000
message_size_limit 262144
max_inflight_messages 40
max_keepalive 120
